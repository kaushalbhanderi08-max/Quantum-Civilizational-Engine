name: Data Preprocessing Engine

on: [push]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v3
        
      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.9'
          
      - name: Install dependencies
        run: pip install pandas numpy qiskit qiskit-aer
        
      - name: List files
        run: ls -R
        
      - name: Run Ingestion & Preprocessor
        run: |
          python src/data_preprocessor.py
          python src/data_ingestion.py
